<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Pulse — News & Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --ink-light: #555;
    --ink-faint: #999;
    --paper: #faf8f4;
    --white: #ffffff;
    --accent: #c0392b;
    --accent-dark: #922b21;
    --gold: #d4a017;
    --border: #e0dcd4;
    --ad-bg: #f0ede6;
  }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.6;
  }

  .topbar {
    background: var(--ink);
    color: #ccc;
    font-size: 12px;
    text-align: center;
    padding: 6px 16px;
    letter-spacing: 0.5px;
  }
  .topbar span { color: var(--gold); font-weight: 600; }

  header {
    background: var(--white);
    border-bottom: 3px solid var(--ink);
    padding: 24px 16px 16px;
    text-align: center;
  }
  .site-tagline {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .site-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 900;
    letter-spacing: -2px;
    color: var(--ink);
    line-height: 1;
  }
  .site-title span { color: var(--accent); }
  .site-date {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  nav {
    background: var(--ink);
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0;
  }
  nav a {
    color: #ddd;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 12px 20px;
    transition: background 0.2s, color 0.2s;
    font-weight: 600;
  }
  nav a:hover { background: var(--accent); color: #fff; }
  nav a.active { color: var(--gold); }

  .ad-banner {
    background: var(--ad-bg);
    border: 1.5px dashed var(--border);
    text-align: center;
    padding: 20px 16px;
    margin: 20px auto;
    max-width: 960px;
    border-radius: 4px;
    position: relative;
  }
  .ad-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-faint);
    position: absolute;
    top: 6px;
    left: 10px;
  }
  .ad-banner-inner {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    color: #fff;
    padding: 20px 32px;
    border-radius: 3px;
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .ad-banner-inner .ad-cta {
    background: var(--gold);
    color: var(--ink);
    padding: 8px 20px;
    border-radius: 2px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
  .layout { display: grid; grid-template-columns: 1fr 300px; gap: 40px; padding: 32px 0; }

  .hero-story {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 0;
    border: 1.5px solid var(--ink);
    margin-bottom: 32px;
    background: var(--white);
  }
  .hero-image {
    background: linear-gradient(160deg, #101522 0%, #172033 45%, #263859 100%);
    min-height: 360px;
    display: flex;
    align-items: flex-end;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .hero-image::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.03) 40px,
      rgba(255,255,255,0.03) 41px
    );
  }
  .hero-category-badge {
    position: absolute;
    top: 20px;
    left: 20px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    font-weight: 700;
  }
  .hero-visual-text {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
    font-weight: 900;
    color: rgba(255,255,255,0.08);
    line-height: 1;
    position: absolute;
    bottom: 16px;
    right: 16px;
    text-align: right;
  }
  .hero-content { padding: 32px 28px; display: flex; flex-direction: column; justify-content: center; }
  .hero-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 12px;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 14px;
    color: var(--ink);
  }
  .hero-excerpt { font-size: 15px; color: var(--ink-light); margin-bottom: 18px; line-height: 1.7; }
  .read-more {
    display: inline-block;
    background: var(--ink);
    color: #fff;
    padding: 10px 20px;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    font-weight: 600;
    align-self: flex-start;
    transition: background 0.2s;
  }
  .read-more:hover { background: var(--accent); }
  .hero-meta { font-size: 12px; color: var(--ink-faint); margin-top: 12px; }
  .hero-meta strong { color: var(--ink-light); }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    border-bottom: 3px solid var(--ink);
    padding-bottom: 8px;
  }
  .section-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .section-header .tag {
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 8px;
    font-weight: 700;
  }

  .articles-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 32px; }
  .article-card { background: var(--white); border: 1px solid var(--border); }
  .card-thumb { height: 140px; position: relative; overflow: hidden; }
  .card-thumb-bg {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .card-cat {
    position: absolute;
    bottom: 8px; left: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    font-weight: 700;
  }
  .card-body { padding: 14px; }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .card-title a { text-decoration: none; color: inherit; }
  .card-title a:hover { color: var(--accent); }
  .card-excerpt { font-size: 13px; color: var(--ink-light); line-height: 1.6; margin-bottom: 10px; }
  .card-meta { font-size: 11px; color: var(--ink-faint); }
  .card-meta strong { color: var(--accent); }

  .articles-list { display: flex; flex-direction: column; gap: 0; }
  .list-article {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    align-items: start;
  }
  .list-thumb { height: 72px; border-radius: 2px; overflow: hidden; }
  .list-thumb-bg { width: 100%; height: 100%; }
  .list-cat { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .list-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    text-decoration: none;
    display: block;
    margin-bottom: 4px;
  }
  .list-title:hover { color: var(--accent); }
  .list-meta { font-size: 11px; color: var(--ink-faint); }

  .sidebar { display: flex; flex-direction: column; gap: 28px; }
  .sidebar-widget { background: var(--white); border: 1px solid var(--border); }
  .widget-header {
    background: var(--ink);
    color: var(--white);
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .widget-body { padding: 16px; }

  .sidebar-ad {
    background: var(--ad-bg);
    border: 1.5px dashed var(--border);
    padding: 16px;
    text-align: center;
    position: relative;
  }
  .sidebar-ad .ad-label { position: static; display: block; margin-bottom: 10px; }
  .sidebar-ad-inner {
    background: #1a1a2e;
    color: #fff;
    padding: 20px 16px;
    border-radius: 3px;
  }
  .sidebar-ad-inner h4 { font-size: 15px; margin-bottom: 8px; font-weight: 700; }
  .sidebar-ad-inner p { font-size: 12px; color: #bbb; margin-bottom: 14px; }
  .sidebar-ad-btn {
    display: block;
    background: var(--gold);
    color: var(--ink);
    padding: 9px;
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border-radius: 2px;
  }

  .trending-item {
    display: flex; gap: 10px; align-items: start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .trending-item:last-child { border-bottom: none; }
  .trending-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--border);
    line-height: 1;
    min-width: 28px;
  }
  .trending-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
    line-height: 1.4;
    display: block;
  }
  .trending-title:hover { color: var(--accent); }
  .trending-cat { font-size: 10px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  .affiliate-box {
    border: 2px solid var(--gold);
    background: #fffdf5;
  }
  .affiliate-box .widget-header {
    background: var(--gold);
    color: var(--ink);
  }
  .affiliate-item {
    display: flex; flex-direction: column; gap: 6px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .affiliate-item:last-child { border-bottom: none; }
  .aff-name { font-weight: 700; font-size: 14px; color: var(--ink); }
  .aff-desc { font-size: 12px; color: var(--ink-light); }
  .aff-stars { color: var(--gold); font-size: 12px; }
  .aff-link {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    align-self: flex-start;
    margin-top: 2px;
  }

  .newsletter-box { background: var(--ink); padding: 28px 24px; text-align: center; margin-bottom: 32px; }
  .newsletter-box h3 {
    font-family: 'Playfair Display', serif;
    color: #fff; font-size: 22px; margin-bottom: 6px;
  }
  .newsletter-box p { color: #999; font-size: 13px; margin-bottom: 18px; }
  .newsletter-form { display: flex; gap: 0; max-width: 420px; margin: 0 auto; }
  .newsletter-form input {
    flex: 1;
    padding: 12px 16px;
    border: none;
    font-size: 14px;
    outline: none;
    font-family: 'Source Sans 3', sans-serif;
  }
  .newsletter-form button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
  }
  .newsletter-form button:hover { background: var(--accent-dark); }

  .affiliate-section { background: #fffdf5; border: 2px solid var(--gold); padding: 24px; margin-bottom: 32px; }
  .affiliate-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    margin-bottom: 4px;
  }
  .affiliate-section .sub { font-size: 12px; color: var(--ink-faint); margin-bottom: 20px; }
  .affiliate-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .aff-card {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 16px;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .aff-icon {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .aff-card h4 { font-size: 14px; font-weight: 700; color: var(--ink); }
  .aff-card p { font-size: 12px; color: var(--ink-light); }
  .aff-card .stars { color: var(--gold); font-size: 12px; }
  .aff-card .price { font-size: 18px; font-weight: 700; color: var(--accent); }
  .aff-card a.btn {
    display: block; width: 100%;
    background: var(--ink); color: #fff;
    text-decoration: none;
    padding: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .aff-card a.btn:hover { background: var(--accent); }
  .aff-disclaimer { font-size: 10px; color: var(--ink-faint); margin-top: 12px; }

  footer {
    background: var(--ink);
    color: #888;
    padding: 40px 16px 20px;
    margin-top: 40px;
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 32px;
    max-width: 1200px;
    margin: 0 auto 32px;
  }
  .footer-brand .brand { font-family: 'Playfair Display', serif; font-size: 28px; color: #fff; font-weight: 900; }
  .footer-brand .brand span { color: var(--accent); }
  .footer-brand p { font-size: 13px; margin-top: 10px; line-height: 1.7; }
  footer h4 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #bbb; margin-bottom: 14px; font-weight: 700; }
  footer ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  footer ul li a { color: #888; text-decoration: none; font-size: 13px; }
  footer ul li a:hover { color: #fff; }
  .footer-bottom {
    max-width: 1200px; margin: 0 auto;
    border-top: 1px solid #333;
    padding-top: 20px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 8px;
    font-size: 11px;
  }
  .footer-bottom a { color: #888; text-decoration: none; }
  .footer-bottom a:hover { color: #fff; }

  .breaking-bar {
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    overflow: hidden;
  }
  .breaking-label {
    background: #fff;
    color: var(--accent);
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 8px;
    white-space: nowrap;
  }
  .breaking-text { animation: slide 28s linear infinite; white-space: nowrap; }
  @keyframes slide {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .hero-story { grid-template-columns: 1fr; }
    .hero-image { min-height: 200px; }
    .
